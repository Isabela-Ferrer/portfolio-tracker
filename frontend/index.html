<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Momentum Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen" x-data="portfolioApp()" x-init="init()">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-xl font-semibold text-gray-900 tracking-tight">Portfolio Momentum Tracker</h1>
        <p class="text-xs text-gray-400 mt-0.5">Signal-driven company scoring</p>
      </div>
      <button
        @click="refreshAll()"
        :disabled="refreshing"
        class="inline-flex items-center gap-2 px-4 py-2 bg-gray-900 text-white text-sm font-medium rounded-lg hover:bg-gray-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
      >
        <svg :class="refreshing ? 'animate-spin' : ''" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
        <span x-text="refreshing ? 'Refreshing…' : 'Refresh All'"></span>
      </button>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-8">

    <!-- Loading state -->
    <div x-show="loading" x-cloak class="space-y-3">
      <template x-for="i in 5" :key="i">
        <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5 animate-pulse">
          <div class="flex items-center justify-between">
            <div class="space-y-2">
              <div class="h-4 bg-gray-200 rounded w-40"></div>
              <div class="h-3 bg-gray-100 rounded w-64"></div>
            </div>
            <div class="h-10 bg-gray-200 rounded-lg w-16"></div>
          </div>
        </div>
      </template>
    </div>

    <!-- Error state -->
    <div x-show="error && !loading" x-cloak class="bg-red-50 border border-red-200 rounded-xl p-6 text-center">
      <svg class="w-8 h-8 text-red-400 mx-auto mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <p class="text-red-700 text-sm font-medium" x-text="error"></p>
      <button @click="init()" class="mt-3 text-sm text-red-600 underline hover:no-underline">Try again</button>
    </div>

    <!-- Empty state -->
    <div x-show="!loading && !error && companies.length === 0" x-cloak class="text-center py-20">
      <svg class="w-12 h-12 text-gray-300 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-2 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
      </svg>
      <p class="text-gray-500 text-sm">No companies yet.</p>
      <a href="settings.html" class="mt-3 inline-block text-sm text-blue-600 hover:underline">Add companies in Settings →</a>
    </div>

    <!-- Company list -->
    <div x-show="!loading && !error && companies.length > 0" x-cloak class="space-y-3">

      <!-- Summary bar -->
      <div class="flex items-center justify-between mb-6">
        <p class="text-sm text-gray-500">
          <span class="font-medium text-gray-700" x-text="companies.length"></span> companies tracked
        </p>
        <a href="settings.html" class="text-sm text-gray-500 hover:text-gray-700 flex items-center gap-1 transition-colors">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          Manage
        </a>
      </div>

      <template x-for="company in companies" :key="company.id">
        <div
          @click="navigate(company.id)"
          class="bg-white rounded-xl border border-gray-100 shadow-sm hover:shadow-md hover:border-gray-200 transition-all cursor-pointer p-5 group"
        >
          <div class="flex items-start gap-4">

            <!-- Company info -->
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 mb-1">
                <h2 class="text-base font-semibold text-gray-900 group-hover:text-blue-600 transition-colors truncate" x-text="company.name"></h2>
                <span
                  x-show="company.ticker"
                  class="text-xs font-mono text-gray-400 bg-gray-100 px-1.5 py-0.5 rounded"
                  x-text="company.ticker"
                ></span>
              </div>

              <!-- Blurb -->
              <p
                x-show="company.snapshot?.blurb"
                class="text-sm text-gray-500 leading-snug line-clamp-2"
                x-text="company.snapshot?.blurb"
              ></p>
              <p
                x-show="!company.snapshot?.blurb && !company.snapshotLoading"
                class="text-sm text-gray-300 italic"
              >No snapshot yet</p>
              <p
                x-show="company.snapshotLoading"
                class="text-sm text-gray-300 animate-pulse"
              >Loading…</p>
            </div>

            <!-- Sparkline -->
            <div x-show="company.sparklineData && company.sparklineData.length > 1" class="flex-shrink-0 w-20 h-10">
              <canvas :id="`spark-${company.id}`" width="80" height="40"></canvas>
            </div>

            <!-- Score + delta -->
            <div class="flex-shrink-0 text-right">
              <div
                class="inline-flex items-center justify-center w-14 h-14 rounded-xl text-xl font-bold"
                :class="scoreClass(company.snapshot?.momentum_score)"
                x-text="company.snapshot?.momentum_score != null ? Math.round(company.snapshot.momentum_score) : '–'"
              ></div>
              <div
                x-show="company.snapshot?.delta != null"
                class="mt-1 text-xs font-medium flex items-center justify-end gap-0.5"
                :class="company.snapshot?.delta >= 0 ? 'text-green-600' : 'text-red-500'"
              >
                <span x-text="company.snapshot?.delta >= 0 ? '▲' : '▼'"></span>
                <span x-text="Math.abs(company.snapshot?.delta ?? 0).toFixed(1)"></span>
              </div>
            </div>

          </div>
        </div>
      </template>

    </div>
  </main>

  <script>
    function portfolioApp() {
      return {
        companies: [],
        loading: true,
        refreshing: false,
        error: null,
        charts: {},

        async init() {
          this.loading = true;
          this.error = null;
          try {
            const res = await fetch('/api/companies');
            if (!res.ok) throw new Error(`Failed to load companies (${res.status})`);
            this.companies = await res.json();

            // Fetch latest snapshot for each company in parallel
            await Promise.all(this.companies.map(c => this.fetchLatestSnapshot(c)));
          } catch (e) {
            this.error = e.message;
          } finally {
            this.loading = false;
            // Draw sparklines after DOM updates
            this.$nextTick(() => this.drawSparklines());
          }
        },

        async fetchLatestSnapshot(company) {
          company.snapshotLoading = true;
          company.snapshot = null;
          company.sparklineData = [];
          try {
            const res = await fetch(`/api/companies/${company.id}/snapshots/latest`);
            if (res.ok) {
              company.snapshot = await res.json();
            }
            // Fetch a few snapshots for sparkline
            const histRes = await fetch(`/api/companies/${company.id}/snapshots?limit=10`);
            if (histRes.ok) {
              const history = await histRes.json();
              company.sparklineData = history.map(s => s.momentum_score).reverse();
            }
          } catch (_) {
            // silently fail per-company
          } finally {
            company.snapshotLoading = false;
          }
        },

        drawSparklines() {
          this.companies.forEach(company => {
            if (!company.sparklineData || company.sparklineData.length < 2) return;
            const canvas = document.getElementById(`spark-${company.id}`);
            if (!canvas) return;
            if (this.charts[company.id]) {
              this.charts[company.id].destroy();
            }
            const score = company.snapshot?.momentum_score ?? 50;
            const color = score >= 70 ? '#22c55e' : score >= 40 ? '#eab308' : '#ef4444';
            this.charts[company.id] = new Chart(canvas, {
              type: 'line',
              data: {
                labels: company.sparklineData.map((_, i) => i),
                datasets: [{
                  data: company.sparklineData,
                  borderColor: color,
                  borderWidth: 1.5,
                  pointRadius: 0,
                  tension: 0.4,
                  fill: false,
                }]
              },
              options: {
                responsive: false,
                animation: false,
                plugins: { legend: { display: false }, tooltip: { enabled: false } },
                scales: { x: { display: false }, y: { display: false } },
              }
            });
          });
        },

        async refreshAll() {
          this.refreshing = true;
          try {
            await Promise.all(
              this.companies.map(c =>
                fetch(`/api/companies/${c.id}/refresh`, { method: 'POST' }).catch(() => {})
              )
            );
            // Destroy existing charts before re-fetching
            Object.values(this.charts).forEach(c => c.destroy());
            this.charts = {};
            await Promise.all(this.companies.map(c => this.fetchLatestSnapshot(c)));
            this.$nextTick(() => this.drawSparklines());
          } finally {
            this.refreshing = false;
          }
        },

        navigate(id) {
          window.location.href = `company.html?id=${id}`;
        },

        scoreClass(score) {
          if (score == null) return 'bg-gray-100 text-gray-400';
          if (score >= 70)   return 'bg-green-100 text-green-700';
          if (score >= 40)   return 'bg-yellow-100 text-yellow-700';
          return 'bg-red-100 text-red-600';
        },
      };
    }
  </script>
</body>
</html>
