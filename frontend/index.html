<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Momentum Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen" x-data="portfolioApp()" x-init="init()">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-xl font-semibold text-gray-900 tracking-tight">Portfolio Momentum Tracker</h1>
        <p class="text-xs text-gray-400 mt-0.5">Signal-driven company scoring</p>
      </div>
      <div class="flex items-center gap-3">
        <a href="/settings.html" class="text-sm text-gray-500 hover:text-gray-700 flex items-center gap-1 transition-colors">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          Manage
        </a>
        <button
          @click="refreshAll()"
          :disabled="refreshing"
          class="inline-flex items-center gap-2 px-4 py-2 bg-gray-900 text-white text-sm font-medium rounded-lg hover:bg-gray-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
        >
          <svg :class="refreshing ? 'animate-spin' : ''" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
          </svg>
          <span x-text="refreshing ? 'Refreshing…' : 'Refresh All'"></span>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-8">

    <!-- Loading state -->
    <div x-show="loading" x-cloak class="space-y-2">
      <template x-for="i in 5" :key="i">
        <div class="bg-white rounded-xl border border-gray-100 h-14 animate-pulse"></div>
      </template>
    </div>

    <!-- Error state -->
    <div x-show="error && !loading" x-cloak class="bg-red-50 border border-red-200 rounded-xl p-6 text-center">
      <p class="text-red-700 text-sm font-medium" x-text="error"></p>
      <button @click="init()" class="mt-3 text-sm text-red-600 underline hover:no-underline">Try again</button>
    </div>

    <!-- Empty state -->
    <div x-show="!loading && !error && companies.length === 0" x-cloak class="text-center py-20">
      <svg class="w-12 h-12 text-gray-300 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-2 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
      </svg>
      <p class="text-gray-500 text-sm">No companies yet.</p>
      <a href="/settings.html" class="mt-3 inline-block text-sm text-blue-600 hover:underline">Add companies in Settings →</a>
    </div>

    <!-- Table -->
    <div x-show="!loading && !error && companies.length > 0" x-cloak>
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-gray-100">
              <th class="text-left text-xs font-medium text-gray-400 px-5 py-3">Company</th>
              <th class="text-right text-xs font-medium text-gray-400 px-3 py-3">Score</th>
              <th class="text-center text-xs font-medium text-gray-400 px-3 py-3">Trend</th>
              <th class="text-left text-xs font-medium text-gray-400 px-3 py-3 min-w-[220px]">📰 Press highlights</th>
              <th class="text-right text-xs font-medium text-gray-400 px-3 py-3">💼 Jobs</th>
              <th class="text-right text-xs font-medium text-gray-400 px-3 py-3">📱 Rating</th>
              <th class="text-right text-xs font-medium text-gray-400 px-3 py-3">🚀 Launches</th>
              <th class="text-right text-xs font-medium text-gray-400 px-3 py-3">💰 Funding</th>
              <th class="text-left text-xs font-medium text-gray-400 px-3 py-3 min-w-[200px]">🟠 Reddit</th>
              <th class="text-left text-xs font-medium text-gray-400 px-3 py-3 min-w-[220px]">⚡ Key signals</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="company in companies" :key="company.id">
              <tr
                @click="navigate(company.id)"
                class="border-b border-gray-50 last:border-0 hover:bg-blue-50 cursor-pointer transition-colors"
              >
                <!-- Company name + logo + last updated -->
                <td class="px-5 py-3">
                  <div class="flex items-center gap-3">
                    <!-- Logo: letter-avatar always underneath; Clearbit image on top, hides on error -->
                    <div class="w-8 h-8 shrink-0 rounded-lg overflow-hidden relative"
                      :style="'background:' + letterBgColor(company.name)">
                      <span class="absolute inset-0 flex items-center justify-center text-sm font-bold text-white select-none"
                        x-text="company.name[0]?.toUpperCase()"></span>
                      <img
                        :src="logoUrl(company.website_url)"
                        class="absolute inset-0 w-full h-full object-contain bg-white p-0.5 rounded-lg"
                        @error="onLogoError($event, company.website_url)"
                        loading="lazy"
                      />
                    </div>
                    <div>
                      <p class="font-medium text-gray-900" x-text="company.name"></p>
                      <p class="text-xs text-gray-400 mt-0.5" x-show="company.snap" x-text="timeAgo(company.snap?.fetched_at)"></p>
                      <p class="text-xs text-gray-300 italic mt-0.5" x-show="!company.snap">No snapshot</p>
                    </div>
                  </div>
                </td>

                <!-- Score badge + trend delta -->
                <td class="px-3 py-3 text-right">
                  <div class="inline-flex flex-col items-center gap-0.5">
                    <span
                      class="inline-flex items-center justify-center w-10 h-10 rounded-lg text-base font-bold"
                      :class="scoreClass(company.snap?.momentum_score)"
                      x-text="company.snap?.momentum_score != null ? Math.round(company.snap.momentum_score) : '–'"
                    ></span>
                    <template x-if="company.trends?.momentum_score && company.trends.momentum_score.direction !== 'flat'">
                      <span
                        class="text-[10px] font-semibold leading-none"
                        :class="company.trends.momentum_score.direction === 'up' ? 'text-green-500' : 'text-red-400'"
                        x-text="(company.trends.momentum_score.delta > 0 ? '↑ +' : '↓ ') + Math.abs(company.trends.momentum_score.delta)"
                      ></span>
                    </template>
                  </div>
                </td>

                <!-- Sparkline -->
                <td class="px-3 py-3 text-center">
                  <div x-show="company.history && company.history.length > 1" class="inline-block w-16 h-8">
                    <canvas :id="`spark-${company.id}`" width="64" height="32"></canvas>
                  </div>
                  <span x-show="!company.history || company.history.length <= 1" class="text-gray-200 text-xs">—</span>
                </td>

                <!-- Raw signal values -->
                <!-- Press: top 3 AI-extracted bullet points -->
                <td class="px-3 py-3 min-w-[220px]">
                  <template x-if="rawSignals(company.snap).press_bullets?.length">
                    <div>
                      <ul class="space-y-1">
                        <template x-for="(bullet, i) in rawSignals(company.snap).press_bullets" :key="i">
                          <li class="text-xs text-gray-600 leading-snug flex gap-1.5">
                            <span class="text-gray-300 shrink-0 select-none">•</span>
                            <span x-text="bullet"></span>
                          </li>
                        </template>
                      </ul>
                      <template x-if="company.trends?.press && company.trends.press.direction !== 'flat'">
                        <p class="text-[10px] font-medium mt-1 leading-none"
                          :class="company.trends.press.direction === 'up' ? 'text-green-500' : 'text-red-400'"
                          x-text="(company.trends.press.delta > 0 ? '+' : '') + company.trends.press.delta + ' vs last month'"
                        ></p>
                      </template>
                    </div>
                  </template>
                  <span x-show="!rawSignals(company.snap).press_bullets?.length" class="text-xs text-gray-300">—</span>
                </td>

                <!-- Jobs: open role count -->
                <td class="px-3 py-3 text-right">
                  <template x-if="rawSignals(company.snap).jobs_count != null">
                    <div class="inline-flex flex-col items-end gap-0.5">
                      <span class="text-xs font-medium text-gray-700" x-text="rawSignals(company.snap).jobs_count"></span>
                      <template x-if="company.trends?.jobs && company.trends.jobs.direction !== 'flat'">
                        <span class="text-[10px] font-medium leading-none"
                          :class="company.trends.jobs.direction === 'up' ? 'text-green-500' : 'text-red-400'"
                          x-text="(company.trends.jobs.delta > 0 ? '+' : '') + company.trends.jobs.delta"
                        ></span>
                      </template>
                    </div>
                  </template>
                  <span x-show="rawSignals(company.snap).jobs_count == null" class="text-xs text-gray-300">—</span>
                </td>

                <!-- App: avg rating -->
                <td class="px-3 py-3 text-right">
                  <template x-if="rawSignals(company.snap).avg_rating">
                    <div class="inline-flex flex-col items-end gap-0.5">
                      <span class="text-xs font-medium text-gray-700" x-text="rawSignals(company.snap).avg_rating + '★'"></span>
                      <span class="text-[10px] text-gray-400" x-text="rawSignals(company.snap).rating_label"></span>
                    </div>
                  </template>
                  <span x-show="!rawSignals(company.snap).avg_rating" class="text-xs text-gray-300">—</span>
                </td>

                <!-- Launches: count -->
                <td class="px-3 py-3 text-right">
                  <template x-if="rawSignals(company.snap).launches_count != null">
                    <div class="inline-flex flex-col items-end gap-0.5">
                      <span class="text-xs font-medium text-gray-700" x-text="rawSignals(company.snap).launches_count"></span>
                      <template x-if="company.trends?.launches && company.trends.launches.direction !== 'flat'">
                        <span class="text-[10px] font-medium leading-none"
                          :class="company.trends.launches.direction === 'up' ? 'text-green-500' : 'text-red-400'"
                          x-text="(company.trends.launches.delta > 0 ? '+' : '') + company.trends.launches.delta"
                        ></span>
                      </template>
                    </div>
                  </template>
                  <span x-show="rawSignals(company.snap).launches_count == null" class="text-xs text-gray-300">—</span>
                </td>

                <!-- Funding: amount + round type + date -->
                <td class="px-3 py-3 text-right">
                  <template x-if="rawSignals(company.snap).funding_label">
                    <div class="inline-flex flex-col items-end gap-0.5">
                      <span class="text-xs font-medium text-gray-700" x-text="rawSignals(company.snap).funding_label"></span>
                      <span x-show="rawSignals(company.snap).funding_sublabel"
                        class="text-[10px] text-gray-400"
                        x-text="rawSignals(company.snap).funding_sublabel"></span>
                      <span x-show="rawSignals(company.snap).funding_extra"
                        class="text-[10px] text-gray-400 italic"
                        x-text="rawSignals(company.snap).funding_extra"></span>
                    </div>
                  </template>
                  <span x-show="!rawSignals(company.snap).funding_label" class="text-xs text-gray-300">—</span>
                </td>

                <!-- Reddit: top 3 post titles as bullets -->
                <td class="px-3 py-3 min-w-[200px]">
                  <template x-if="rawSignals(company.snap).reddit_bullets?.length">
                    <div>
                      <ul class="space-y-1">
                        <template x-for="(bullet, i) in rawSignals(company.snap).reddit_bullets" :key="i">
                          <li class="text-xs text-gray-600 leading-snug flex gap-1.5">
                            <span class="text-orange-300 shrink-0 select-none">•</span>
                            <span x-text="bullet"></span>
                          </li>
                        </template>
                      </ul>
                      <template x-if="company.trends?.reddit && company.trends.reddit.direction !== 'flat'">
                        <p class="text-[10px] font-medium mt-1 leading-none"
                          :class="company.trends.reddit.direction === 'up' ? 'text-green-500' : 'text-red-400'"
                          x-text="(company.trends.reddit.delta > 0 ? '+' : '') + company.trends.reddit.delta + ' vs last month'"
                        ></p>
                      </template>
                    </div>
                  </template>
                  <span x-show="!rawSignals(company.snap).reddit_bullets?.length" class="text-xs text-gray-300">—</span>
                </td>

                <!-- AI key signals (3 VC-relevant bullets) -->
                <td class="px-3 py-3 min-w-[220px]">
                  <template x-if="aiHighlights(company.snap).length">
                    <ul class="space-y-1">
                      <template x-for="(h, i) in aiHighlights(company.snap)" :key="i">
                        <li class="text-xs text-gray-600 leading-snug flex gap-1.5">
                          <span class="text-indigo-300 shrink-0 select-none font-bold">·</span>
                          <span x-text="h"></span>
                        </li>
                      </template>
                    </ul>
                  </template>
                  <!-- fallback: prose blurb for old snapshots without highlights -->
                  <template x-if="!aiHighlights(company.snap).length && company.snap?.ai_blurb">
                    <p class="text-xs text-gray-500 line-clamp-3 leading-snug" x-text="company.snap.ai_blurb"></p>
                  </template>
                  <span x-show="!aiHighlights(company.snap).length && !company.snap?.ai_blurb" class="text-xs text-gray-300">—</span>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <script>
    function portfolioApp() {
      return {
        companies: [],
        loading: true,
        refreshing: false,
        error: null,
        sparkCharts: {},

        async init() {
          this.loading = true;
          this.error = null;
          try {
            const res = await fetch('/api/companies');
            if (!res.ok) throw new Error(`Failed to load companies (${res.status})`);
            const list = await res.json();

            // Attach snap + history placeholders
            this.companies = list.map(c => ({ ...c, snap: null, history: [], trends: null }));

            // Fetch latest snapshot + history for each company concurrently
            await Promise.all(this.companies.map(c => this.loadCompanyData(c)));
          } catch (e) {
            this.error = e.message;
          } finally {
            this.loading = false;
            this.$nextTick(() => this.drawAllSparklines());
          }
        },

        async loadCompanyData(company) {
          try {
            const [latestRes, histRes] = await Promise.all([
              fetch(`/api/companies/${company.id}/snapshots/latest`),
              fetch(`/api/companies/${company.id}/snapshots?limit=10`),
            ]);
            if (latestRes.ok) {
              const snap = await latestRes.json();
              // Filter out the sentinel "no snapshots" response
              company.snap = (snap && !snap.message) ? snap : null;
              company.trends = company.snap?.signal_trends ?? null;
            }
            if (histRes.ok) {
              const hist = await histRes.json();
              company.history = hist
                .filter(s => s.momentum_score != null)
                .map(s => s.momentum_score)
                .reverse(); // oldest → newest
            }
          } catch (_) {
            // silently fail per-company
          }
        },

        drawAllSparklines() {
          // Destroy old charts
          Object.values(this.sparkCharts).forEach(c => c.destroy());
          this.sparkCharts = {};
          this.companies.forEach(company => {
            if (!company.history || company.history.length < 2) return;
            const canvas = document.getElementById(`spark-${company.id}`);
            if (!canvas) return;
            const score = company.snap?.momentum_score ?? 50;
            const color = score >= 70 ? '#22c55e' : score >= 40 ? '#eab308' : '#ef4444';
            this.sparkCharts[company.id] = new Chart(canvas, {
              type: 'line',
              data: {
                labels: company.history.map((_, i) => i),
                datasets: [{
                  data: company.history,
                  borderColor: color,
                  borderWidth: 1.5,
                  pointRadius: 0,
                  tension: 0.4,
                  fill: false,
                }]
              },
              options: {
                responsive: false,
                animation: false,
                plugins: { legend: { display: false }, tooltip: { enabled: false } },
                scales: { x: { display: false }, y: { display: false } },
              }
            });
          });
        },

        async refreshAll() {
          this.refreshing = true;
          try {
            await Promise.all(
              this.companies.map(c =>
                fetch(`/api/companies/${c.id}/refresh`, { method: 'POST' }).catch(() => {})
              )
            );
            await Promise.all(this.companies.map(c => this.loadCompanyData(c)));
            this.$nextTick(() => this.drawAllSparklines());
          } finally {
            this.refreshing = false;
          }
        },

        rawSignals(snap) {
          if (!snap) return {};
          const parse = (col, def) => {
            try { return snap[col] ? JSON.parse(snap[col]) : def; } catch { return def; }
          };
          const press    = parse('press_data', []);
          const jobs     = parse('jobs_data', {});
          const app      = parse('appstore_data', []);
          const launches = parse('product_launches_data', []);
          const funding  = parse('funding_data', []);
          const social   = parse('social_data', []);

          // App rating: average across platforms
          let avg_rating = null;
          let rating_label = '';
          if (app.length > 0) {
            const rated = app.filter(a => a.avg_rating > 0);
            if (rated.length > 0) {
              avg_rating = (rated.reduce((s, a) => s + a.avg_rating, 0) / rated.length).toFixed(1);
              rating_label = rated.map(a => a.platform).join('/');
            }
          }

          // Funding: pick the most informative signal (prefer one with amount or round_type),
          // then format as "Amount RoundType" + a date sub-label so it's clear what it refers to.
          let funding_label    = null;
          let funding_sublabel = null;
          let funding_extra    = null;   // "+N more" when multiple rounds detected
          if (funding.length > 0) {
            const best = funding.find(f => f.amount_hint || f.round_type) ?? funding[0];
            const parts = [];
            if (best.amount_hint) parts.push(best.amount_hint);
            if (best.round_type)  parts.push(best.round_type);
            funding_label = parts.length ? parts.join(' ') : `${funding.length} article${funding.length !== 1 ? 's' : ''}`;

            // Date: parse RFC 2822 or ISO, format as "Mon YYYY"
            if (best.date) {
              try {
                const d = new Date(best.date);
                if (!isNaN(d)) {
                  funding_sublabel = d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
                }
              } catch {}
            }

            // Show "+N more" if other distinct rounds exist beyond the best signal
            const others = funding.filter(f => f !== best && (f.amount_hint || f.round_type));
            if (others.length > 0) funding_extra = `+${others.length} more`;
          }

          // Press bullets: up to 3 AI key_points pooled from articles in order.
          // Falls back to article titles if key_points haven't been extracted yet.
          const press_bullets = [];
          for (const article of press) {
            const kps = article.key_points;
            if (kps && kps.length > 0) {
              for (const kp of kps) {
                if (press_bullets.length < 3) press_bullets.push(kp);
              }
            } else if (press_bullets.length < 3 && article.title) {
              press_bullets.push(article.title);
            }
            if (press_bullets.length >= 3) break;
          }

          // Reddit bullets: top 3 post titles from reddit social signals
          const reddit_posts = social.filter(s => s.platform === 'reddit');
          const reddit_bullets = reddit_posts.slice(0, 3).map(s => s.content).filter(Boolean);

          return {
            press_bullets,
            press_count:    press.length,
            jobs_count:     jobs.total_count ?? null,
            avg_rating,
            rating_label,
            launches_count: launches.length,
            funding_label,
            funding_sublabel,
            funding_extra,
            reddit_bullets,
            reddit_count:   reddit_posts.length,
          };
        },

        _domain(website_url) {
          if (!website_url) return '';
          try {
            const url = website_url.startsWith('http') ? website_url : 'https://' + website_url;
            return new URL(url).hostname.replace(/^www\./, '');
          } catch { return ''; }
        },

        logoUrl(website_url) {
          const d = this._domain(website_url);
          // Clearbit first — best quality when it works
          return d ? `https://logo.clearbit.com/${d}` : '';
        },

        onLogoError(event, website_url) {
          const d = this._domain(website_url);
          if (d && !event.target.dataset.fallback) {
            // Stage 2: Google's favicon service — backed by Google infra, works for every domain
            event.target.dataset.fallback = '1';
            event.target.src = `https://www.google.com/s2/favicons?domain=${d}&sz=64`;
          } else {
            // Both sources failed — hide image, letter avatar shows through
            event.target.style.display = 'none';
          }
        },

        letterBgColor(name) {
          const palette = [
            '#6366f1','#8b5cf6','#ec4899','#f43f5e',
            '#f97316','#eab308','#22c55e','#14b8a6',
            '#3b82f6','#06b6d4',
          ];
          let h = 0;
          for (const c of (name || '')) h = c.charCodeAt(0) + h * 31;
          return palette[Math.abs(h) % palette.length];
        },

        aiHighlights(snap) {
          if (!snap?.ai_highlights) return [];
          try {
            const parsed = JSON.parse(snap.ai_highlights);
            return Array.isArray(parsed) ? parsed.filter(Boolean) : [];
          } catch { return []; }
        },

        timeAgo(iso) {
          if (!iso) return '';
          const diff = Date.now() - new Date(iso).getTime();
          const m = Math.floor(diff / 60000);
          if (m < 1)  return 'just now';
          if (m < 60) return `${m}m ago`;
          const h = Math.floor(m / 60);
          if (h < 24) return `${h}h ago`;
          return `${Math.floor(h / 24)}d ago`;
        },

        navigate(id) {
          window.location.href = `/company.html?id=${id}`;
        },

        scoreClass(score) {
          if (score == null) return 'bg-gray-100 text-gray-400';
          if (score >= 70)   return 'bg-green-100 text-green-700';
          if (score >= 40)   return 'bg-yellow-100 text-yellow-700';
          return 'bg-red-100 text-red-600';
        },
      };
    }
  </script>
</body>
</html>
